name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  BACKEND_IMAGE: digitale-behoerde-backend
  FRONTEND_IMAGE: digitale-behoerde-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: digitale_behoerde_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d digitale_behoerde_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Test frontend
        working-directory: ./frontend
        run: npm test

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Prepare backend test database
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/digitale_behoerde_test
        run: npx prisma migrate deploy

      - name: Test backend
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/digitale_behoerde_test
          JWT_SECRET: ci-test-secret
        run: npm test

      - name: Build backend for end-to-end tests
        working-directory: ./backend
        run: npm run build

      - name: Seed end-to-end test accounts
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/digitale_behoerde_test
        run: npx prisma db seed

      - name: Install Playwright Chromium
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Test complete browser workflow
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/digitale_behoerde_test
          JWT_SECRET: ci-test-secret
          DOCUMENT_STORAGE: local
          UPLOAD_DIR: /tmp/digitale-behoerde-e2e-uploads
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
        run: |
          mkdir -p "$UPLOAD_DIR"

          node backend/dist/server.js >/tmp/digitale-behoerde-backend.log 2>&1 &
          BACKEND_PID=$!
          npm --prefix frontend run dev -- --host 127.0.0.1 --port 3000 \
            >/tmp/digitale-behoerde-frontend.log 2>&1 &
          FRONTEND_PID=$!

          trap 'kill "$BACKEND_PID" "$FRONTEND_PID" 2>/dev/null || true' EXIT

          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:3000/api/health >/dev/null; then
              break
            fi
            if [ "$attempt" = "30" ]; then
              cat /tmp/digitale-behoerde-backend.log
              cat /tmp/digitale-behoerde-frontend.log
              exit 1
            fi
            sleep 1
          done

          npm --prefix frontend run test:e2e

      - name: Build Docker containers
        run: docker compose build

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Configure Container Apps for ACR access
        run: |
          ACR_ID=$(az acr show \
            --name ${{ secrets.ACR_NAME }} \
            --query "id" \
            --output tsv)

          for APP_NAME in "${{ secrets.AZURE_BACKEND_APP }}" "${{ secrets.AZURE_FRONTEND_APP }}"; do
            az containerapp identity assign \
              --name "$APP_NAME" \
              --resource-group ${{ secrets.AZURE_RG }} \
              --system-assigned

            PRINCIPAL_ID=$(az containerapp identity show \
              --name "$APP_NAME" \
              --resource-group ${{ secrets.AZURE_RG }} \
              --query "principalId" \
              --output tsv)

            ROLE_COUNT=$(az role assignment list \
              --assignee-object-id "$PRINCIPAL_ID" \
              --scope "$ACR_ID" \
              --query "[?roleDefinitionName=='AcrPull'] | length(@)" \
              --output tsv)

            if [ "$ROLE_COUNT" = "0" ]; then
              az role assignment create \
                --assignee-object-id "$PRINCIPAL_ID" \
                --assignee-principal-type ServicePrincipal \
                --role AcrPull \
                --scope "$ACR_ID"
            fi

            az containerapp registry set \
              --name "$APP_NAME" \
              --resource-group ${{ secrets.AZURE_RG }} \
              --server ${{ secrets.ACR_LOGIN_SERVER }} \
              --identity system
          done

      - name: Configure private document storage
        run: |
          STORAGE_ACCOUNT=$(echo "${{ secrets.ACR_NAME }}docs" \
            | tr -cd '[:alnum:]' \
            | tr '[:upper:]' '[:lower:]' \
            | cut -c1-24)

          if ! az storage account show \
            --name "$STORAGE_ACCOUNT" \
            --resource-group ${{ secrets.AZURE_RG }} >/dev/null 2>&1; then
            az storage account create \
              --name "$STORAGE_ACCOUNT" \
              --resource-group ${{ secrets.AZURE_RG }} \
              --sku Standard_LRS \
              --kind StorageV2 \
              --allow-blob-public-access false \
              --min-tls-version TLS1_2
          fi

          STORAGE_ID=$(az storage account show \
            --name "$STORAGE_ACCOUNT" \
            --resource-group ${{ secrets.AZURE_RG }} \
            --query id \
            --output tsv)

          STORAGE_KEY=$(az storage account keys list \
            --account-name "$STORAGE_ACCOUNT" \
            --resource-group ${{ secrets.AZURE_RG }} \
            --query '[0].value' \
            --output tsv)

          az storage container create \
            --name application-documents \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "$STORAGE_KEY" \
            --public-access off

          unset STORAGE_KEY

          BACKEND_PRINCIPAL_ID=$(az containerapp identity show \
            --name ${{ secrets.AZURE_BACKEND_APP }} \
            --resource-group ${{ secrets.AZURE_RG }} \
            --query principalId \
            --output tsv)

          ROLE_COUNT=$(az role assignment list \
            --assignee-object-id "$BACKEND_PRINCIPAL_ID" \
            --scope "$STORAGE_ID" \
            --query "[?roleDefinitionName=='Storage Blob Data Contributor'] | length(@)" \
            --output tsv)

          if [ "$ROLE_COUNT" = "0" ]; then
            az role assignment create \
              --assignee-object-id "$BACKEND_PRINCIPAL_ID" \
              --assignee-principal-type ServicePrincipal \
              --role "Storage Blob Data Contributor" \
              --scope "$STORAGE_ID"
          fi

          echo "DOCUMENT_STORAGE_ACCOUNT=$STORAGE_ACCOUNT" >> "$GITHUB_ENV"

      - name: Build backend image
        run: docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ./frontend

      - name: Push backend image
        run: docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Push frontend image
        run: docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Deploy backend to Azure Container App
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_BACKEND_APP }} \
            --resource-group ${{ secrets.AZURE_RG }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --set-env-vars \
              "DOCUMENT_STORAGE=azure" \
              "AZURE_STORAGE_ACCOUNT=$DOCUMENT_STORAGE_ACCOUNT" \
              "AZURE_STORAGE_CONTAINER=application-documents"

      - name: Smoke test deployed backend
        run: |
          BACKEND_FQDN=$(az containerapp show \
            --name ${{ secrets.AZURE_BACKEND_APP }} \
            --resource-group ${{ secrets.AZURE_RG }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)

          test -n "$BACKEND_FQDN"

          curl \
            --fail \
            --silent \
            --show-error \
            --retry 12 \
            --retry-delay 5 \
            --retry-all-errors \
            --max-time 10 \
            "https://$BACKEND_FQDN/api/health" \
            | grep --quiet '"status":"ok"'

      - name: Deploy frontend to Azure Container App
        run: |
          BACKEND_FQDN=$(az containerapp show \
            --name ${{ secrets.AZURE_BACKEND_APP }} \
            --resource-group ${{ secrets.AZURE_RG }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv)

          test -n "$BACKEND_FQDN"

          az containerapp update \
            --name ${{ secrets.AZURE_FRONTEND_APP }} \
            --resource-group ${{ secrets.AZURE_RG }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --set-env-vars "BACKEND_URL=https://$BACKEND_FQDN"
