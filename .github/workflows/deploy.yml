name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  BACKEND_IMAGE: digitale-behoerde-backend
  FRONTEND_IMAGE: digitale-behoerde-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Test frontend
        working-directory: ./frontend
        run: npm test

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Test backend
        working-directory: ./backend
        run: npm test

      - name: Build Docker containers
        run: docker compose build

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Read Azure Container Registry credentials
        id: acr-credentials
        run: |
          ACR_USERNAME=$(az acr credential show \
            --name ${{ secrets.ACR_NAME }} \
            --query "username" \
            --output tsv)
          ACR_PASSWORD=$(az acr credential show \
            --name ${{ secrets.ACR_NAME }} \
            --query "passwords[0].value" \
            --output tsv)

          echo "::add-mask::$ACR_USERNAME"
          echo "::add-mask::$ACR_PASSWORD"
          echo "username=$ACR_USERNAME" >> "$GITHUB_OUTPUT"
          echo "password=$ACR_PASSWORD" >> "$GITHUB_OUTPUT"

      - name: Build backend image
        run: docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ./frontend

      - name: Push backend image
        run: docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Push frontend image
        run: docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Deploy backend to Azure Container App
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_BACKEND_APP }} \
            --resource-group ${{ secrets.AZURE_RG }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --registry-server ${{ secrets.ACR_LOGIN_SERVER }} \
            --registry-username ${{ steps.acr-credentials.outputs.username }} \
            --registry-password ${{ steps.acr-credentials.outputs.password }}

      - name: Deploy frontend to Azure Container App
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_FRONTEND_APP }} \
            --resource-group ${{ secrets.AZURE_RG }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --registry-server ${{ secrets.ACR_LOGIN_SERVER }} \
            --registry-username ${{ steps.acr-credentials.outputs.username }} \
            --registry-password ${{ steps.acr-credentials.outputs.password }}
