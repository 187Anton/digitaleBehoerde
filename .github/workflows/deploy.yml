name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  BACKEND_IMAGE: digitale-behoerde-backend
  FRONTEND_IMAGE: digitale-behoerde-frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: digitale_behoerde_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d digitale_behoerde_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Test frontend
        working-directory: ./frontend
        run: npm test

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Prepare backend test database
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/digitale_behoerde_test
        run: npx prisma migrate deploy

      - name: Test backend
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/digitale_behoerde_test
          JWT_SECRET: ci-test-secret
        run: npm test

      - name: Build Docker containers
        run: docker compose build

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to Azure Container Registry
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - name: Configure Container Apps for ACR access
        run: |
          ACR_ID=$(az acr show \
            --name ${{ secrets.ACR_NAME }} \
            --query "id" \
            --output tsv)

          for APP_NAME in "${{ secrets.AZURE_BACKEND_APP }}" "${{ secrets.AZURE_FRONTEND_APP }}"; do
            az containerapp identity assign \
              --name "$APP_NAME" \
              --resource-group ${{ secrets.AZURE_RG }} \
              --system-assigned

            PRINCIPAL_ID=$(az containerapp identity show \
              --name "$APP_NAME" \
              --resource-group ${{ secrets.AZURE_RG }} \
              --query "principalId" \
              --output tsv)

            ROLE_COUNT=$(az role assignment list \
              --assignee-object-id "$PRINCIPAL_ID" \
              --scope "$ACR_ID" \
              --query "[?roleDefinitionName=='AcrPull'] | length(@)" \
              --output tsv)

            if [ "$ROLE_COUNT" = "0" ]; then
              az role assignment create \
                --assignee-object-id "$PRINCIPAL_ID" \
                --assignee-principal-type ServicePrincipal \
                --role AcrPull \
                --scope "$ACR_ID"
            fi

            az containerapp registry set \
              --name "$APP_NAME" \
              --resource-group ${{ secrets.AZURE_RG }} \
              --server ${{ secrets.ACR_LOGIN_SERVER }} \
              --identity system
          done

      - name: Build backend image
        run: docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} ./backend

      - name: Build frontend image
        run: docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ./frontend

      - name: Push backend image
        run: docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Push frontend image
        run: docker push ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      - name: Deploy backend to Azure Container App
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_BACKEND_APP }} \
            --resource-group ${{ secrets.AZURE_RG }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Deploy frontend to Azure Container App
        run: |
          az containerapp update \
            --name ${{ secrets.AZURE_FRONTEND_APP }} \
            --resource-group ${{ secrets.AZURE_RG }} \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
