services:
  frontend:
    build:
      context: ./frontend
    container_name: digitale-behoerde-frontend
    ports:
      - "3000:80"
    environment:
      - BACKEND_URL=http://backend:3001
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    container_name: digitale-behoerde-backend
    ports:
      - "3001:3001"
    depends_on:
      - database
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@database:5432/digitale_behoerde
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET muss fuer den Produktionsmodus gesetzt sein}
      - CORS_ORIGIN=http://localhost:3000
      - UPLOAD_DIR=/app/uploads
      - DOCUMENT_STORAGE=local
    volumes:
      - uploads_data:/app/uploads

  database:
    image: postgres:16-alpine
    container_name: digitale-behoerde-database
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=digitale_behoerde
    volumes:
      - postgres_data:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: digitale-behoerde-prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus

volumes:
  postgres_data:
  uploads_data:
  prometheus_data:
