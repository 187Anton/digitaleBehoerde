services:
  frontend:
    build:
      context: ./frontend
    container_name: digitale-behoerde-frontend
    ports:
      - "3000:80"
    environment:
      - BACKEND_URL=http://backend:3001
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    container_name: digitale-behoerde-backend
    ports:
      - "3001:3001"
    depends_on:
      - database
    environment:
      - PORT=3001
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@database:5432/digitale_behoerde
      - CORS_ORIGIN=http://localhost:3000

  database:
    image: postgres:16-alpine
    container_name: digitale-behoerde-database
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=digitale_behoerde
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
